<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Bling Bling Baku</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --pink: #e8879e; --pink-light: #f7c5d0; --pink-pale: #fdf0f3; --pink-deep: #d4637a;
      --white: #fff; --text-dark: #2a1a1f; --text-mid: #6b4553; --text-light: #b08a95;
      --border: #f0d9de; --font-display: 'Cormorant Garamond', serif; --font-body: 'Jost', sans-serif;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: #faf6f7; color: var(--text-dark); }
    a { text-decoration: none; color: inherit; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--pink-pale), #fce8ed);
    }
    .login-box {
      background: white; border-radius: 20px; padding: 50px 44px;
      box-shadow: 0 8px 40px rgba(212,99,122,0.15); width: 380px; text-align: center;
    }
    .login-logo { font-family: var(--font-display); font-size: 2rem; color: var(--pink-deep); margin-bottom: 6px; }
    .login-sub { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 32px; }
    .login-box input {
      width: 100%; padding: 13px 18px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: var(--font-body); font-size: 0.9rem;
      color: var(--text-dark); background: var(--pink-pale); outline: none; margin-bottom: 14px;
    }
    .login-box input:focus { border-color: var(--pink); background: white; }
    .btn-login {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      color: white; border: none; border-radius: 50px; cursor: pointer;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; letter-spacing: 0.1em;
      margin-top: 8px; transition: transform 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); }
    .login-error { color: #e05555; font-size: 0.82rem; margin-top: 10px; display: none; }

    /* ADMIN LAYOUT */
    .admin-app { display: none; min-height: 100vh; }
    .admin-header {
      background: var(--text-dark); padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-logo { font-family: var(--font-display); font-size: 1.3rem; color: var(--pink-light); }
    .admin-nav { display: flex; gap: 4px; }
    .admin-nav button {
      padding: 8px 20px; border-radius: 50px; border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 0.82rem; letter-spacing: 0.08em;
      background: transparent; color: rgba(255,255,255,0.5); transition: all 0.2s;
    }
    .admin-nav button.active, .admin-nav button:hover { background: var(--pink-deep); color: white; }
    .admin-header-right { display: flex; gap: 12px; align-items: center; }
    .header-store-link {
      font-size: 0.8rem; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 6px;
    }
    .header-store-link:hover { color: var(--pink-light); }
    .btn-logout {
      padding: 7px 18px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); border-radius: 50px; cursor: pointer;
      font-family: var(--font-body); font-size: 0.78rem; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); color: white; }

    .admin-body { max-width: 1300px; margin: 0 auto; padding: 36px 24px; }
    .admin-page { display: none; }
    .admin-page.active { display: block; }

    /* DASHBOARD */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 36px; }
    .stat-card {
      background: white; border-radius: var(--radius); padding: 28px 24px;
      border: 1px solid var(--border); display: flex; align-items: center; gap: 18px;
    }
    .stat-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--pink-pale); display: flex; align-items: center; justify-content: center;
      color: var(--pink-deep); font-size: 1.3rem; flex-shrink: 0;
    }
    .stat-val { font-family: var(--font-display); font-size: 2rem; color: var(--text-dark); line-height: 1; }
    .stat-lbl { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }

    /* PRODUCTS TABLE */
    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    .page-header h2 { font-family: var(--font-display); font-size: 1.8rem; }
    .btn-add {
      padding: 11px 26px; background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      color: white; border: none; border-radius: 50px; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px; transition: transform 0.2s;
    }
    .btn-add:hover { transform: translateY(-2px); }

    .admin-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .table-toolbar {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .table-search {
      padding: 9px 16px; border: 1.5px solid var(--border); border-radius: 50px;
      font-family: var(--font-body); font-size: 0.85rem; outline: none; min-width: 220px;
    }
    .table-search:focus { border-color: var(--pink); }
    .cat-filter-select, .status-filter {
      padding: 9px 16px; border: 1.5px solid var(--border); border-radius: 50px;
      font-family: var(--font-body); font-size: 0.85rem; outline: none;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--pink-pale); padding: 12px 16px;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-light); font-weight: 500; text-align: left;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: #fdf7f9; }
    tbody td { padding: 14px 16px; font-size: 0.88rem; color: var(--text-mid); vertical-align: middle; }
    .prod-thumb {
      width: 50px; height: 50px; border-radius: 10px; object-fit: cover;
      background: var(--pink-pale); display: flex; align-items: center; justify-content: center;
      color: var(--pink-light); font-size: 1.2rem; overflow: hidden;
    }
    .prod-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .prod-name { font-weight: 500; color: var(--text-dark); }
    .cat-badge {
      padding: 3px 10px; border-radius: 50px; background: var(--pink-pale);
      color: var(--pink-deep); font-size: 0.72rem; font-weight: 500; text-transform: capitalize;
    }
    .price-cell { color: var(--pink-deep); font-weight: 500; }
    .qty-cell { font-weight: 500; }
    .qty-low { color: #e07a20; }
    .qty-out { color: #e05555; }
    .status-toggle {
      display: inline-flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 0.82rem;
    }
    .toggle-dot {
      width: 36px; height: 20px; border-radius: 50px; position: relative;
      transition: background 0.2s;
    }
    .toggle-dot::after {
      content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%;
      background: white; top: 3px; left: 3px; transition: transform 0.2s;
    }
    .toggle-on { background: var(--pink-deep); }
    .toggle-on::after { transform: translateX(16px); }
    .toggle-off { background: #ddd; }
    .action-btns { display: flex; gap: 6px; }
    .btn-edit, .btn-del {
      width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
      background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .btn-edit { color: var(--text-mid); }
    .btn-edit:hover { background: var(--pink-pale); border-color: var(--pink); color: var(--pink-deep); }
    .btn-del { color: var(--text-light); }
    .btn-del:hover { background: #fff0f0; border-color: #e05555; color: #e05555; }

    /* PRODUCT FORM MODAL */
    .form-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 2000; display: none; align-items: center; justify-content: center;
    }
    .form-overlay.open { display: flex; }
    .product-form {
      background: white; border-radius: 20px; width: 720px; max-width: 96vw;
      max-height: 92vh; overflow-y: auto; padding: 40px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.2);
    }
    .form-title {
      font-family: var(--font-display); font-size: 1.7rem; margin-bottom: 28px;
      color: var(--text-dark); border-bottom: 1px solid var(--border); padding-bottom: 16px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-light); font-weight: 500; }
    .form-input, .form-select, .form-textarea {
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.9rem; color: var(--text-dark);
      background: var(--pink-pale); outline: none; transition: border 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--pink); background: white; }
    .form-textarea { resize: vertical; min-height: 90px; }

    /* Image upload */
    .img-upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: var(--pink-pale);
    }
    .img-upload-area:hover { border-color: var(--pink); background: white; }
    .img-upload-area i { font-size: 2rem; color: var(--pink-light); margin-bottom: 10px; display: block; }
    .img-upload-area p { font-size: 0.85rem; color: var(--text-light); }
    .img-upload-area input { display: none; }
    .img-previews { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .img-preview {
      width: 80px; height: 80px; border-radius: 10px; overflow: hidden;
      position: relative; border: 1px solid var(--border);
    }
    .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview .remove-img {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px; border-radius: 50%; background: rgba(224,85,85,0.9);
      color: white; border: none; cursor: pointer; font-size: 0.65rem; display: flex;
      align-items: center; justify-content: center;
    }

    /* Colors */
    .color-manager { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .color-chip {
      width: 32px; height: 32px; border-radius: 50%; border: 3px solid white;
      box-shadow: 0 0 0 1.5px var(--border); cursor: pointer; position: relative;
    }
    .color-chip .rm-color {
      position: absolute; inset: -2px; border-radius: 50%; display: none;
      background: rgba(0,0,0,0.5); color: white; font-size: 0.6rem;
      align-items: center; justify-content: center; cursor: pointer; border: none;
    }
    .color-chip:hover .rm-color { display: flex; }
    .add-color-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: 1.5px dashed var(--border); border-radius: 50px;
      cursor: pointer; font-size: 0.82rem; color: var(--text-light); background: none; transition: all 0.2s;
    }
    .add-color-btn:hover { border-color: var(--pink); color: var(--pink-deep); }
    .color-picker-input { width: 32px; height: 32px; border: none; background: none; cursor: pointer; padding: 0; }

    .form-footer {
      display: flex; gap: 12px; justify-content: flex-end;
      margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
    }
    .btn-cancel {
      padding: 11px 26px; background: var(--pink-pale); border: none; border-radius: 50px;
      cursor: pointer; font-family: var(--font-body); font-size: 0.85rem; color: var(--text-mid); transition: background 0.2s;
    }
    .btn-cancel:hover { background: var(--border); }
    .btn-save {
      padding: 11px 30px; background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      color: white; border: none; border-radius: 50px; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em;
      transition: transform 0.2s;
    }
    .btn-save:hover { transform: translateY(-1px); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text-dark); color: white; padding: 14px 28px; border-radius: 50px;
      font-size: 0.88rem; z-index: 9999; transition: transform 0.3s; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .admin-nav { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Bling Bling Baku</div>
    <div class="login-sub">Admin Panel</div>
    <input type="text" id="loginUser" placeholder="Username" />
    <input type="password" id="loginPass" placeholder="Password" onkeypress="if(event.key==='Enter')doLogin()" />
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="loginError">Incorrect username or password</p>
    <p style="margin-top:20px;font-size:0.75rem;color:#ccc">Default: admin / bling2025</p>
  </div>
</div>

<!-- ADMIN APP -->
<div class="admin-app" id="adminApp">
  <header class="admin-header">
    <div class="admin-logo">✦ Admin</div>
    <nav class="admin-nav">
      <button class="active" onclick="showPage('dashboard', this)"><i class="fas fa-chart-bar"></i> Dashboard</button>
      <button onclick="showPage('products', this)"><i class="fas fa-gem"></i> Products</button>
    </nav>
    <div class="admin-header-right">
      <a href="../index.html" target="_blank" class="header-store-link"><i class="fas fa-external-link-alt"></i> View Store</a>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div class="admin-body">
    <!-- DASHBOARD -->
    <div class="admin-page active" id="page-dashboard">
      <div class="page-header">
        <h2>Dashboard</h2>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="admin-card">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border)">
          <h3 style="font-family:var(--font-display);font-size:1.3rem">Low Stock Alert</h3>
        </div>
        <div style="padding:20px 24px" id="lowStockList"></div>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="admin-page" id="page-products">
      <div class="page-header">
        <h2>Products</h2>
        <button class="btn-add" onclick="openForm()"><i class="fas fa-plus"></i> Add Product</button>
      </div>
      <div class="admin-card">
        <div class="table-toolbar">
          <input type="text" class="table-search" placeholder="Search products…" oninput="renderTable()" id="tableSearch" />
          <select class="cat-filter-select" id="catFilter" onchange="renderTable()">
            <option value="">All Categories</option>
            <option value="necklaces">Necklaces</option>
            <option value="rings">Rings</option>
            <option value="earrings">Earrings</option>
            <option value="bracelets">Bracelets</option>
            <option value="bags">Bags</option>
            <option value="accessories">Accessories</option>
          </select>
          <select class="status-filter" id="statusFilter" onchange="renderTable()">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCT FORM -->
<div class="form-overlay" id="formOverlay">
  <div class="product-form">
    <h2 class="form-title" id="formTitle">Add New Product</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" class="form-input" id="fName" placeholder="e.g. Gold Chain Necklace" />
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select class="form-select" id="fCat">
          <option value="">Select category</option>
          <option value="necklaces">Necklaces</option>
          <option value="rings">Rings</option>
          <option value="earrings">Earrings</option>
          <option value="bracelets">Bracelets</option>
          <option value="bags">Bags</option>
          <option value="accessories">Accessories</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (AZN) *</label>
        <input type="number" class="form-input" id="fPrice" placeholder="0.00" step="0.01" min="0" />
      </div>
      <div class="form-group">
        <label>Original Price (AZN) — for sale</label>
        <input type="number" class="form-input" id="fOldPrice" placeholder="Leave blank if no sale" step="0.01" min="0" />
      </div>
      <div class="form-group">
        <label>Stock Quantity *</label>
        <input type="number" class="form-input" id="fQty" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Badge</label>
        <select class="form-select" id="fBadge">
          <option value="">No badge</option>
          <option value="New">New</option>
          <option value="Sale">Sale</option>
          <option value="Bestseller">Bestseller</option>
          <option value="Limited">Limited</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Describe this product…"></textarea>
      </div>
      <div class="form-group full">
        <label>Product Images (upload from your phone/computer)</label>
        <div class="img-upload-area" onclick="document.getElementById('fImgInput').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>Click to upload photos</p>
          <p style="font-size:0.75rem;margin-top:6px">JPG, PNG, WEBP • multiple allowed</p>
          <input type="file" id="fImgInput" accept="image/*" multiple onchange="handleImgUpload(this)" />
        </div>
        <div class="img-previews" id="imgPreviews"></div>
      </div>
      <div class="form-group full">
        <label>Available Colors</label>
        <div class="color-manager" id="colorManager">
          <button class="add-color-btn" onclick="addColorPicker()">
            <i class="fas fa-plus"></i> Add Color
          </button>
        </div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-save" onclick="saveProduct()"><i class="fas fa-check"></i> Save Product</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ADMIN LOGIC
// ============================================================
const ADMIN_PASS = { user: 'admin', pass: 'bling2025' };
let editingId = null;
let formImages = [];
let formColors = [];

// ---- AUTH ----
function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_PASS.user && p === ADMIN_PASS.pass) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    loadDashboard();
    renderTable();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ---- NAVIGATION ----
function showPage(page, btn) {
  document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (page === 'dashboard') loadDashboard();
  if (page === 'products') renderTable();
}

// ---- PRODUCTS ----
function getProducts() {
  const stored = localStorage.getItem('bbb_products');
  if (!stored) return [];
  // FIX: ensure all IDs and quantities are numbers, never strings or undefined
  return JSON.parse(stored).map(p => ({
    ...p,
    id: Number(p.id),
    price: Number(p.price) || 0,
    quantity: p.quantity !== undefined && p.quantity !== null ? Number(p.quantity) : 0
  }));
}
function saveProducts(products) {
  localStorage.setItem('bbb_products', JSON.stringify(products));
}

function loadDashboard() {
  const products = getProducts();
  const active = products.filter(p => p.active !== false).length;
  const outOfStock = products.filter(p => p.quantity <= 0).length;
  const totalVal = products.reduce((s, p) => s + p.price * (p.quantity || 0), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-gem"></i></div><div><div class="stat-val">${products.length}</div><div class="stat-lbl">Total Products</div></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div><div class="stat-val">${active}</div><div class="stat-lbl">Active Products</div></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div><div><div class="stat-val" style="color:#e05555">${outOfStock}</div><div class="stat-lbl">Out of Stock</div></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-tag"></i></div><div><div class="stat-val">${totalVal.toFixed(0)}</div><div class="stat-lbl">Total Stock Value (AZN)</div></div></div>`;

  const low = products.filter(p => p.quantity > 0 && p.quantity <= 5);
  document.getElementById('lowStockList').innerHTML = low.length
    ? low.map(p => `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-weight:500">${p.name}</span><span style="color:#e07a20;font-weight:500">${p.quantity} left</span></div>`).join('')
    : '<p style="color:var(--text-light);font-size:0.88rem">All products are well stocked ✦</p>';
}

function renderTable() {
  const q = (document.getElementById('tableSearch')?.value || '').toLowerCase().trim();
  const cat = document.getElementById('catFilter')?.value || '';
  const status = document.getElementById('statusFilter')?.value || '';
  const products = getProducts().filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
    const matchC = !cat || p.category === cat;
    const matchS = !status || (status === 'active' ? p.active !== false : p.active === false);
    return matchQ && matchC && matchS;
  });

  document.getElementById('productTableBody').innerHTML = products.map(p => {
    const isActive = p.active !== false;
    const qty = p.quantity;
    const qtyClass = qty <= 0 ? 'qty-out' : qty <= 5 ? 'qty-low' : '';
    const thumb = p.images && p.images.length
      ? `<div class="prod-thumb"><img src="${p.images[0]}" alt="" /></div>`
      : `<div class="prod-thumb"><i class="fas fa-gem"></i></div>`;
    // FIX: store id as data attribute to avoid any JS type issues in onclick
    return `
    <tr>
      <td>${thumb}</td>
      <td><div class="prod-name">${p.name}</div></td>
      <td><span class="cat-badge">${p.category}</span></td>
      <td class="price-cell">${p.price} AZN${p.oldPrice ? `<br><span style="font-size:0.75rem;color:var(--text-light);text-decoration:line-through">${p.oldPrice}</span>` : ''}</td>
      <td class="qty-cell ${qtyClass}">${qty}</td>
      <td>
        <button class="status-toggle" data-id="${p.id}" onclick="toggleStatus(Number(this.dataset.id))">
          <div class="toggle-dot ${isActive ? 'toggle-on' : 'toggle-off'}"></div>
          <span style="font-size:0.8rem;color:var(--text-light)">${isActive ? 'Active' : 'Hidden'}</span>
        </button>
      </td>
      <td>
        <div class="action-btns">
          <button class="btn-edit" data-id="${p.id}" onclick="openForm(Number(this.dataset.id))" title="Edit"><i class="fas fa-pencil-alt"></i></button>
          <button class="btn-del" data-id="${p.id}" onclick="deleteProduct(Number(this.dataset.id))" title="Delete"><i class="fas fa-trash-alt"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-light)">No products found</td></tr>';
}

function toggleStatus(id) {
  // FIX: use == (loose) comparison as safety net and also Number() cast
  const products = getProducts();
  const p = products.find(x => Number(x.id) === Number(id));
  if (p) { p.active = p.active === false ? true : false; saveProducts(products); renderTable(); }
}

function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return;
  // FIX: cast both sides to Number so "7" === 7 works
  const products = getProducts().filter(p => Number(p.id) !== Number(id));
  saveProducts(products);
  renderTable(); loadDashboard();
  showToast('Product deleted');
}

// ---- FORM ----
function openForm(id) {
  // FIX: explicitly check for null/undefined, NOT just falsy (id=0 edge case)
  const isEdit = id !== null && id !== undefined;
  editingId = isEdit ? Number(id) : null;
  formImages = [];
  formColors = [];
  document.getElementById('imgPreviews').innerHTML = '';
  document.getElementById('colorManager').innerHTML = '<button class="add-color-btn" onclick="addColorPicker()"><i class="fas fa-plus"></i> Add Color</button>';

  if (isEdit) {
    // FIX: cast both sides to Number when finding
    const p = getProducts().find(x => Number(x.id) === Number(id));
    if (!p) { showToast('Product not found'); return; }
    document.getElementById('formTitle').textContent = 'Edit Product';
    document.getElementById('fName').value = p.name || '';
    document.getElementById('fCat').value = p.category || '';
    document.getElementById('fPrice').value = p.price || '';
    document.getElementById('fOldPrice').value = p.oldPrice || '';
    document.getElementById('fQty').value = p.quantity !== undefined ? p.quantity : '';
    document.getElementById('fBadge').value = p.badge || '';
    document.getElementById('fDesc').value = p.description || '';
    formImages = p.images ? [...p.images] : [];
    formColors = p.colors ? [...p.colors] : [];
    renderImgPreviews();
    renderColorChips();
  } else {
    document.getElementById('formTitle').textContent = 'Add New Product';
    ['fName','fPrice','fOldPrice','fQty','fDesc'].forEach(fid => document.getElementById(fid).value = '');
    document.getElementById('fCat').value = '';
    document.getElementById('fBadge').value = '';
  }
  document.getElementById('formOverlay').classList.add('open');
}

function closeForm() {
  document.getElementById('formOverlay').classList.remove('open');
  editingId = null;
}

function saveProduct() {
  const name = document.getElementById('fName').value.trim();
  const cat = document.getElementById('fCat').value;
  const price = parseFloat(document.getElementById('fPrice').value);
  const oldPrice = parseFloat(document.getElementById('fOldPrice').value) || null;
  const qty = parseInt(document.getElementById('fQty').value);
  const badge = document.getElementById('fBadge').value;
  const desc = document.getElementById('fDesc').value.trim();

  if (!name) { showToast('Please enter a product name'); return; }
  if (!cat) { showToast('Please select a category'); return; }
  if (isNaN(price) || price < 0) { showToast('Please enter a valid price'); return; }
  if (isNaN(qty) || qty < 0) { showToast('Please enter a valid quantity'); return; }

  const products = getProducts();

  if (editingId !== null) {
    // FIX: cast both to Number for reliable match
    const idx = products.findIndex(p => Number(p.id) === Number(editingId));
    if (idx > -1) {
      products[idx] = { ...products[idx], name, category: cat, price, oldPrice, quantity: qty, badge: badge || null, description: desc, images: formImages, colors: formColors };
      saveProducts(products);
      closeForm(); renderTable(); loadDashboard();
      showToast('Product updated ✦');
    } else {
      showToast('Error: product not found');
    }
  } else {
    // FIX: generate new ID as max+1, always a Number
    const allIds = products.map(p => Number(p.id)).filter(n => !isNaN(n));
    const newId = allIds.length > 0 ? Math.max(...allIds) + 1 : 1;
    products.push({ id: newId, name, category: cat, price, oldPrice, quantity: qty, badge: badge || null, description: desc, images: formImages, colors: formColors, active: true });
    saveProducts(products);
    closeForm(); renderTable(); loadDashboard();
    showToast('Product added ✦');
  }
}

// ---- IMAGE UPLOAD ----
function handleImgUpload(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      formImages.push(e.target.result);
      renderImgPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderImgPreviews() {
  document.getElementById('imgPreviews').innerHTML = formImages.map((src, i) => `
    <div class="img-preview">
      <img src="${src}" alt="" />
      <button class="remove-img" onclick="removeImg(${i})"><i class="fas fa-times"></i></button>
    </div>`).join('');
}
function removeImg(i) { formImages.splice(i, 1); renderImgPreviews(); }

// ---- COLORS ----
function addColorPicker() {
  const input = document.createElement('input');
  input.type = 'color'; input.value = '#E8879E';
  input.className = 'color-picker-input';
  input.style.cssText = 'width:32px;height:32px;border:none;background:none;cursor:pointer;padding:0;border-radius:50%';
  input.onchange = (e) => { formColors.push(e.target.value); renderColorChips(); };
  input.click();
}

function renderColorChips() {
  const mgr = document.getElementById('colorManager');
  mgr.innerHTML = formColors.map((c, i) => `
    <div class="color-chip" style="background:${c}">
      <button class="rm-color" onclick="removeColor(${i})"><i class="fas fa-times"></i></button>
    </div>`).join('') + '<button class="add-color-btn" onclick="addColorPicker()"><i class="fas fa-plus"></i> Add Color</button>';
}
function removeColor(i) { formColors.splice(i, 1); renderColorChips(); }

// ---- TOAST ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
